name: Corneish Zen Build

on:
  push:
    paths:
      - 'corneish_zen/**'
      - 'shared/**'
      - 'build-corneish_zen.yaml'
      - '.github/workflows/corneish_zen.yml'
  pull_request:
    paths:
      - 'corneish_zen/**'
      - 'shared/**'
      - 'build-corneish_zen.yaml'
      - '.github/workflows/corneish_zen.yml'
  workflow_dispatch:

jobs:
  vars:
    runs-on: ubuntu-latest
    outputs:
      sha_short: ${{ steps.vars.outputs.sha_short }}
    steps:
      - uses: actions/checkout@v4
      - id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

  build:
    needs: vars
    uses: zmkfirmware/zmk/.github/workflows/build-user-config.yml@main
    with:
      build_matrix_path: "build-corneish_zen.yaml"
      config_path: "corneish_zen"
      archive_name: "corneish_zen_firmware_${{ needs.vars.outputs.sha_short }}"
