name: Build Totem

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      run: ${{ steps.filter.outputs.run }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            run:
              - 'totem/**'
              - 'shared/**'
              - 'build-totem.yaml'
              - '.github/workflows/build-totem.yml'

  vars:
    needs: [changes]
    if: needs.changes.outputs.run == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      sha_short: ${{ steps.vars.outputs.sha_short }}
    steps:
      - uses: actions/checkout@v4
      - id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

  build:
    needs: [changes, vars]
    if: needs.changes.outputs.run == 'true' || github.event_name == 'workflow_dispatch'
    uses: zmkfirmware/zmk/.github/workflows/build-user-config.yml@main
    with:
      build_matrix_path: "build-totem.yaml"
      config_path: "totem"
      archive_name: "firmware_totem_${{ needs.vars.outputs.sha_short }}"
