on: [push, pull_request, workflow_dispatch]

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      totem: ${{ steps.filter.outputs.totem }}
      corneish_zen: ${{ steps.filter.outputs.corneish_zen }}
      sha_short: ${{ steps.vars.outputs.sha_short }}
    steps:
      - uses: actions/checkout@v4
      - id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            totem:
              - 'totem/**'
              - 'shared/**'
              - 'build-totem.yaml'
              - '.github/workflows/build.yml'
            corneish_zen:
              - 'corneish_zen/**'
              - 'shared/**'
              - 'build-corneish_zen.yaml'
              - '.github/workflows/build.yml'

  build-totem:
    needs: changes
    if: needs.changes.outputs.totem == 'true' || github.event_name == 'workflow_dispatch'
    uses: zmkfirmware/zmk/.github/workflows/build-user-config.yml@main
    with:
      build_matrix_path: "build-totem.yaml"
      config_path: "totem"
      archive_name: "totem_firmware_${{ needs.changes.outputs.sha_short }}"

  build-corneish_zen:
    needs: changes
    if: needs.changes.outputs.corneish_zen == 'true' || github.event_name == 'workflow_dispatch'
    uses: zmkfirmware/zmk/.github/workflows/build-user-config.yml@main
    with:
      build_matrix_path: "build-corneish_zen.yaml"
      config_path: "corneish_zen"
      archive_name: "corneish_zen_firmware_${{ needs.changes.outputs.sha_short }}"
